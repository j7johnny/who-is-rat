server {
    listen 80;
    client_max_body_size 25m;

    # Static files — served directly by nginx with long cache
    location /static/ {
        alias /var/www/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Protected media — internal only, Django controls access via X-Accel-Redirect
    location /protected-media/ {
        internal;
        alias /var/www/media/;
        add_header Cache-Control "private, no-store";
    }

    # Extraction uploads — also internal
    location /protected-media/extraction_uploads/ {
        internal;
        alias /var/www/media/extraction_uploads/;
        add_header Cache-Control "private, no-store";
    }

    # All other requests go to Django
    location / {
        proxy_pass http://web:8000;
        proxy_buffering off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_redirect off;
    }
}
