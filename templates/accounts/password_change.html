{% extends "base.html" %}

{% block title %}修改密碼 | CatchingRat{% endblock %}

{% block content %}
<section class="stack">
    <div>
        <p class="eyebrow">帳號安全</p>
        <h2>修改密碼</h2>
    </div>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label class="field">
            <span>{{ form.old_password.label }}</span>
            {{ form.old_password }}
            {{ form.old_password.errors }}
        </label>
        <label class="field">
            <span>{{ form.new_password1.label }}</span>
            {{ form.new_password1 }}
            {{ form.new_password1.errors }}
        </label>
        <label class="field">
            <span>{{ form.new_password2.label }}</span>
            {{ form.new_password2 }}
            {{ form.new_password2.errors }}
        </label>
        <button type="submit" class="primary-button">更新密碼</button>
    </form>
</section>
{% endblock %}
