<!DOCTYPE html>
<html lang="zh-Hant" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Who-Is-Rat{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['"Noto Sans TC"', '"Microsoft JhengHei"', '"PingFang TC"', 'system-ui', 'sans-serif'],
          mono: ['Consolas', '"JetBrains Mono"', 'monospace'],
        },
        colors: {
          brand: {
            50: '#fef7ee', 100: '#fdedd3', 200: '#f9d7a5',
            300: '#f5ba6d', 400: '#ef9333', 500: '#ec7b14',
            600: '#dd600a', 700: '#b7450b', 800: '#923710',
            900: '#762f10',
          },
        },
      },
    },
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/site.css">
  {% block head %}{% endblock %}
</head>
<body class="h-full bg-stone-50 text-stone-900 font-sans antialiased {% block body_class %}{% endblock %}">

  {% block layout %}
  <main class="min-h-full">
    {% block content %}{% endblock %}
  </main>
  {% endblock %}

  <!-- Toast messages -->
  <div id="messages" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm" hx-swap-oob="true">
    {% for message in messages %}
    <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0 translate-y-2"
         class="px-4 py-3 rounded-xl shadow-lg backdrop-blur-sm border cursor-pointer text-sm font-medium
                {% if message.tags == 'error' %}bg-red-50/90 border-red-200 text-red-800
                {% elif message.tags == 'warning' %}bg-amber-50/90 border-amber-200 text-amber-800
                {% else %}bg-emerald-50/90 border-emerald-200 text-emerald-800{% endif %}"
         @click="show = false">
      {{ message }}
    </div>
    {% endfor %}
  </div>

  <script src="/static/htmx.min.js"></script>
  <script>
  (function(){
    document.cookie="viewport_width="+window.innerWidth+";path=/;samesite=lax";
    if(!document.cookie.includes("preferred_device="))
      document.cookie="preferred_device="+(window.innerWidth<=768?"mobile":"desktop")+";path=/;samesite=lax";
  })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
